<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Gridly Electrical Checker">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Gridly Electrical Checker</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: radial-gradient(circle at 20% 20%, #1f3b6b 0%, #0b1424 50%, #070d18 100%);
      --text: #f1f5f9;
      --muted: #9fb2c8;
      --ring: #4cc9f0;
      --ring-soft: rgba(76, 201, 240, 0.25);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #070d18;
      overflow: hidden;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      z-index: 9999;
      transition: opacity 420ms ease;
    }

    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .splash-card {
      width: min(88vw, 420px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
      padding: 24px 18px;
      border-radius: 20px;
      background: rgba(10, 20, 37, 0.35);
      backdrop-filter: blur(4px);
      box-shadow: 0 20px 56px rgba(0, 0, 0, 0.45);
    }

    .logo-wrap {
      width: 168px;
      height: 168px;
      display: grid;
      place-items: center;
      position: relative;
      isolation: isolate;
    }

    .logo-glyph {
      width: 124px;
      height: 124px;
      border-radius: 22px;
      overflow: hidden;
      box-shadow:
        0 0 56px rgba(247, 181, 0, 0.40),
        0 0 18px rgba(247, 181, 0, 0.20),
        0 10px 32px rgba(0, 0, 0, 0.75);
      animation: pulse 1.8s ease-in-out infinite;
    }

    .logo-glyph img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.50);
      transform-origin: center;
    }

    .logo-wrap::before,
    .logo-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 4px solid transparent;
      animation: spin 1.6s linear infinite;
    }

    .logo-wrap::before {
      border-top-color: #F7B500;
      border-right-color: #F7B500;
      box-shadow: 0 0 28px rgba(247, 181, 0, 0.35);
    }

    .logo-wrap::after {
      inset: 12px;
      border-bottom-color: rgba(247, 181, 0, 0.55);
      border-left-color: rgba(247, 181, 0, 0.55);
      animation-direction: reverse;
      animation-duration: 2.3s;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 30px);
      letter-spacing: 0.02em;
      font-weight: 700;
    }

    .disclaimer {
      margin: 0;
      color: var(--muted);
      font-size: clamp(12px, 2.8vw, 13px);
      line-height: 1.45;
      max-width: 34ch;
    }

    .loading-copy {
      margin: 0;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(241, 245, 249, 0.85);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }
  </style>
</head>
<body>
  <div id="splash" aria-live="polite" aria-label="Ekran ladowania aplikacji">
    <div class="splash-card">
      <div class="logo-wrap">
        <div class="logo-glyph">
          <img src="assets/assets/images/logo_mark.png" alt="Gridly logo" />
        </div>
      </div>
      <h1>Gridly Electrical Checker</h1>
      <p class="loading-copy">Ladowanie aplikacji...</p>
      <p class="disclaimer">
        Wyniki analiz maja charakter pomocniczy i nie zastepuja projektu ani odbioru przez uprawnionego specjaliste.
      </p>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener("flutter-first-frame", function () {
      var splash = document.getElementById("splash");
      if (!splash) {
        return;
      }
      splash.classList.add("fade-out");
      window.setTimeout(function () {
        splash.remove();
      }, 460);
    });
  </script>
</body>
</html>
