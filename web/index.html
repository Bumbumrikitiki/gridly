<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Gridly Electrical Checker">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Gridly Electrical Checker</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      --bg: radial-gradient(circle at 20% 20%, #1f3b6b 0%, #0b1424 50%, #070d18 100%);
      --text: #f1f5f9;
      --muted: #9fb2c8;
      --ring: #4cc9f0;
      --ring-soft: rgba(76, 201, 240, 0.25);
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #070d18;
      overflow: hidden;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      z-index: 9999;
      transition: opacity 420ms ease;
    }

    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .splash-card {
      width: min(88vw, 420px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
      padding: 24px 18px;
      border-radius: 20px;
      background: rgba(10, 20, 37, 0.35);
      backdrop-filter: blur(4px);
      box-shadow: 0 20px 56px rgba(0, 0, 0, 0.45);
    }

    .logo-wrap {
      width: 216px;
      height: 216px;
      display: grid;
      place-items: center;
      position: relative;
      isolation: isolate;
    }

    .logo-glyph {
      width: 120px;
      height: 120px;
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      z-index: 2;
      box-shadow:
        0 0 60px rgba(247, 181, 0, 0.45),
        0 0 20px rgba(247, 181, 0, 0.25),
        0 10px 32px rgba(0, 0, 0, 0.80);
      animation: pulse 2s ease-in-out infinite;
    }

    .logo-glyph img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scale(1.50);
      transform-origin: center;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform-origin: center;
      border-style: solid;
      border-color: transparent;
    }

    .ring-1 {
      width: 212px;
      height: 212px;
      margin: -106px 0 0 -106px;
      border-width: 2px;
      border-top-color: #F7B500;
      border-right-color: rgba(247, 181, 0, 0.6);
      border-bottom-color: rgba(247, 181, 0, 0.10);
      border-left-color: rgba(247, 181, 0, 0.35);
      animation: spin 2.4s linear infinite;
      box-shadow: 0 0 18px rgba(247,181,0,0.18);
    }

    .ring-2 {
      width: 178px;
      height: 178px;
      margin: -89px 0 0 -89px;
      border-width: 2px;
      border-bottom-color: rgba(247, 181, 0, 0.80);
      border-left-color: rgba(247, 181, 0, 0.50);
      border-top-color: rgba(247, 181, 0, 0.08);
      border-right-color: rgba(247, 181, 0, 0.20);
      animation: spin 1.7s linear infinite reverse;
    }

    .ring-3 {
      width: 148px;
      height: 148px;
      margin: -74px 0 0 -74px;
      border-width: 1.5px;
      border-top-color: rgba(247, 181, 0, 0.45);
      border-left-color: rgba(247, 181, 0, 0.25);
      border-bottom-color: transparent;
      border-right-color: transparent;
      animation: spin 3.2s linear infinite;
    }

    .app-name {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .name-gridly {
      margin: 0;
      font-size: clamp(30px, 5.5vw, 40px);
      font-weight: 900;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #FFD566 0%, #F7B500 45%, #FF8C00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px rgba(247, 181, 0, 0.55));
    }

    .name-sub {
      margin: 0;
      font-size: clamp(10px, 2vw, 12px);
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #9fb2c8;
    }

    .disclaimer {
      margin: 0;
      color: var(--muted);
      font-size: clamp(12px, 2.8vw, 13px);
      line-height: 1.45;
      max-width: 34ch;
    }

    .loading-copy {
      margin: 0;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(241, 245, 249, 0.85);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }
  </style>
</head>
<body>
  <div id="splash" aria-live="polite" aria-label="Ekran ladowania aplikacji">
    <div class="splash-card">
      <div class="logo-wrap">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="logo-glyph">
          <img src="assets/assets/images/logo_mark.png" alt="Gridly logo" />
        </div>
      </div>
      <div class="app-name">
        <span class="name-gridly">Gridly</span>
        <span class="name-sub">Electrical Checker</span>
      </div>
      <p class="loading-copy">Ladowanie aplikacji...</p>
      <p class="disclaimer">
        Wyniki analiz maja charakter pomocniczy i nie zastepuja projektu ani odbioru przez uprawnionego specjaliste.
      </p>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener("flutter-first-frame", function () {
      var splash = document.getElementById("splash");
      if (!splash) {
        return;
      }
      splash.classList.add("fade-out");
      window.setTimeout(function () {
        splash.remove();
      }, 460);
    });
  </script>
</body>
</html>
